<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>App Layout</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <section class="page-brand">
        <div class="blob blob-1"></div>

        <div class="blob blob-2"></div>
        <div class="brand-logo">Nexus</div>

        <div class="brand-content">
          <p class="brand-eyebrow">Developer Platform</p>

          <h1 class="brand-title">
            Ship Faster.
            <br />

            Scale Fearlessly.
          </h1>

          <p class="brand-description">
            One platform for your APIs, pipelines and deployments.
          </p>
        </div>

        <div class="brand-footer">© 2026 Nexus</div>
      </section>
      <section class="page-form">
        <div class="form-box">
          <div class="form-header">
            <h2 class="form-title">Welcome back</h2>

            <p class="form-sub">
              No account?

              <a href="#"> Start for free → </a>
            </p>
          </div>
          <div class="oauth-row">
            <button class="btn-oauth">GitHub</button>

            <button class="btn-oauth">Google</button>
          </div>
          <div class="divider">OR</div>
          <div class="form-fields">
            <div class="field-wrap">
              <label class="field-label" for="email"> Work Email </label>

              <input class="field-input" id="email" type="email" />
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
